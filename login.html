<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Painel de Esboços </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
 
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #FF6B00;
      --accent-light: #ff8c33;
      --accent-glow: rgba(255,107,0,0.18);
      --text: #f5f5f5;
      --muted: #777;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
 
    /* Decorative background blobs */
    body::before {
      content: '';
      position: fixed;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
 
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; right: -100px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
 
    /* Fiber lines decoration */
    .fiber-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 60px,
          #FF6B00 60px,
          #FF6B00 61px
        );
    }
 
    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
 
    /* LOGO */
    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      gap: 16px;
    }
 
    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #FF6B00, #ff8c33);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 40px rgba(255,107,0,0.3), 0 0 0 1px rgba(255,107,0,0.2);
    }
 
    .logo-mark svg {
      width: 40px;
      height: 40px;
    }
 
    .logo-text {
      text-align: center;
    }
 
    .logo-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }
 
    .logo-name span {
      color: var(--accent);
    }
 
    .logo-sub {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }
 
    /* CARD */
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }
 
    .card-header {
      margin-bottom: 28px;
    }
 
    .card-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }
 
    .card-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }
 
    /* FORM */
    .form-group {
      margin-bottom: 18px;
    }
 
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
 
    .form-group input,
    .form-group select {
      width: 100%;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
 
    .form-group input:focus,
    .form-group select:focus {
      border-color: rgba(255,107,0,0.6);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.10);
    }
 
    .form-group input::placeholder {
      color: #444;
      font-weight: 600;
    }
 
    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }
 
    .error-msg.show { display: block; }
 
    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(255,107,0,0.28);
    }
 
    .btn-login:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(255,107,0,0.36);
    }
 
    .btn-login:active {
      transform: translateY(0);
    }
 
    /* FOOTER */
    .login-footer {
      margin-top: 28px;
      text-align: center;
    }
 
    .footer-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,107,0,0.12);
      color: var(--accent-light);
      border: 1px solid rgba(255,107,0,0.22);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
 
    .footer-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
       
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div>
        <h1>Painel de Esboços</h1>
        <div style="color:#a9b4d0;font-size:13px;">Controle de acesso</div>
      </div>
    </div>

    <div class="sub">
      Entre com seu e-mail corporativo para acessar o painel.
    </div>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seuemail@alloha.com" autocomplete="off" />
      <button type="submit">Entrar</button>
    </form>

    <div class="error" id="errorBox">Usuário não autorizado.</div>

    <div class="hint">
      Desenvolvedor pode alternar entre as visões. Time interno acessa a fila operacional.
    </div>
  </div>

  <script>
    const usuarios = {
      dev: [
        "wender.souza@alloha.com"
      ],
      time: [
        "luiza.carvalho@alloha.com"
      ],
      solicitante: [
        "talita.nascimento@alloha.com",
        "john.santana@alloha.com",
        "maria.cunha@alloha.com"
      ]
    };

    function mostrarErro(msg) {
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "block";
      errorBox.textContent = msg;
    }

    function detectarPerfil(email) {
      if (usuarios.dev.includes(email)) return "dev";
      if (usuarios.time.includes(email)) return "time";
      if (usuarios.solicitante.includes(email)) return "solicitante";
      return null;
    }

    function login(event) {
      if (event) event.preventDefault();

      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "none";

      const email = document.getElementById("email").value.trim().toLowerCase();

      if (!email) {
        mostrarErro("Informe seu e-mail.");
        return;
      }

      const perfil = detectarPerfil(email);

      if (!perfil) {
        mostrarErro("Usuário não autorizado.");
        return;
      }

      localStorage.setItem("usuario", email);
      localStorage.setItem("perfil", perfil);

      window.location.href = "index.html";
    }

    document.getElementById("loginForm").addEventListener("submit", login);

    document.getElementById("email").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login(e);
      }
    });

    const usuarioLogado = localStorage.getItem("usuario");
    const perfilLogado = localStorage.getItem("perfil");

    if (usuarioLogado && perfilLogado) {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
