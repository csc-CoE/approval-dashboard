<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Painel de Esboços</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141b34;
      --border: #26304f;
      --accent: #5b8cff;
      --accent2: #7c4dff;
      --text: #f3f6ff;
      --muted: #a9b4d0;
      --danger: #ff6b6b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(91,140,255,0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(124,77,255,0.20), transparent 28%),
        linear-gradient(135deg, #08101f, #0d1730 55%, #0a1224);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(20, 27, 52, 0.96);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .logo-icon {
      width: 46px;
      height: 46px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 26px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f1630;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(91,140,255,0.15);
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.96;
    }

    .hint {
      margin-top: 16px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .error {
      display: none;
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(255,107,107,0.12);
      border: 1px solid rgba(255,107,107,0.35);
      color: #ffd0d0;
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📋</div>
      <div>
        <h1>Painel de Esboços</h1>
        <div style="color:#a9b4d0;font-size:13px;">Controle de acesso</div>
      </div>
    </div>

    <div class="sub">
      Entre com seu e-mail corporativo para acessar o painel.
    </div>

    <form id="loginForm">
      <label for="email">E-mail</label>
      <input id="email" type="email" placeholder="seuemail@alloha.com" autocomplete="off" />
      <button type="submit">Entrar</button>
    </form>

    <div class="error" id="errorBox">Usuário não autorizado.</div>

    <div class="hint">
      Desenvolvedor pode alternar entre as visões. Time interno acessa a fila operacional.
    </div>
  </div>

  <script>
    const usuarios = {
      dev: [
        "wender.souza@alloha.com"
      ],
      time: [
        "luiza.carvalho@alloha.com"
      ],
      solicitante: [
        "talita.nascimento@alloha.com",
        "john.santana@alloha.com"
      ]
    };

    function mostrarErro(msg) {
      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "block";
      errorBox.textContent = msg;
    }

    function detectarPerfil(email) {
      if (usuarios.dev.includes(email)) return "dev";
      if (usuarios.time.includes(email)) return "time";
      if (usuarios.solicitante.includes(email)) return "solicitante";
      return null;
    }

    function login(event) {
      if (event) event.preventDefault();

      const errorBox = document.getElementById("errorBox");
      errorBox.style.display = "none";

      const email = document.getElementById("email").value.trim().toLowerCase();

      if (!email) {
        mostrarErro("Informe seu e-mail.");
        return;
      }

      const perfil = detectarPerfil(email);

      if (!perfil) {
        mostrarErro("Usuário não autorizado.");
        return;
      }

      localStorage.setItem("usuario", email);
      localStorage.setItem("perfil", perfil);

      window.location.href = "index.html";
    }

    document.getElementById("loginForm").addEventListener("submit", login);

    document.getElementById("email").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        login(e);
      }
    });

    const usuarioLogado = localStorage.getItem("usuario");
    const perfilLogado = localStorage.getItem("perfil");

    if (usuarioLogado && perfilLogado) {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
