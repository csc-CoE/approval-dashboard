<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Painel de Esboços </title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface-2: #1c1c1c;
      --border: #2a2a2a;
      --accent: #FF6B00;
      --accent-light: #ff8c33;
      --accent-glow: rgba(255,107,0,0.18);
      --text: #f5f5f5;
      --muted: #777;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -120px;
      left: -120px;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      right: -100px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .fiber-lines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.04;
      background-image:
        repeating-linear-gradient(
          -45deg,
          transparent,
          transparent 60px,
          #FF6B00 60px,
          #FF6B00 61px
        );
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
      gap: 16px;
    }

    .logo-mark {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #FF6B00, #ff8c33);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 40px rgba(255,107,0,0.3), 0 0 0 1px rgba(255,107,0,0.2);
    }

    .logo-mark svg {
      width: 40px;
      height: 40px;
    }

    .logo-text {
      text-align: center;
    }

    .logo-name {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .logo-name span {
      color: var(--accent);
    }

    .logo-sub {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 32px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .card-header {
      margin-bottom: 28px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 14px;
      font-family: inherit;
      font-weight: 600;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: rgba(255,107,0,0.6);
      box-shadow: 0 0 0 3px rgba(255,107,0,0.10);
    }

    .form-group input::placeholder {
      color: #444;
      font-weight: 600;
    }

    .error-msg {
      display: none;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    .error-msg.show {
      display: block;
    }

    .btn-login {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 15px;
      font-weight: 900;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.3px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(255,107,0,0.28);
    }

    .btn-login:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
      box-shadow: 0 12px 32px rgba(255,107,0,0.36);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .login-footer {
      margin-top: 28px;
      text-align: center;
    }

    .footer-tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,107,0,0.12);
      color: var(--accent-light);
      border: 1px solid rgba(255,107,0,0.22);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .footer-text {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="fiber-lines"></div>

  <div class="login-wrapper">
    <div class="login-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
          <path d="M6 20 Q20 4 34 20" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          <path d="M10 27 Q20 14 30 27" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
          <circle cx="20" cy="33" r="3.5" fill="#fff"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">ALLOHA <span>FIBRA</span></div>
        <div class="logo-sub">Painel de Esboços</div>
      </div>
    </div>

    <div class="login-card">
      <div class="card-header">
        <div class="card-title">Bem-vindo 👋</div>
        <div class="card-desc">Entre com seu e-mail corporativo para acessar o painel.</div>
      </div>

      <div class="form-group">
        <label for="emailInput">E-mail corporativo</label>
        <input
          id="emailInput"
          type="email"
          placeholder="seuemail@alloha.com"
          autocomplete="username"
        />
      </div>

      <div class="error-msg" id="errorMsg">⚠️ Usuário não autorizado.</div>

      <button class="btn-login" onclick="fazerLogin()">Entrar no Painel</button>
    </div>

    <div class="login-footer">
      <div class="footer-tag">COE</div>
      <div class="footer-text">Desenvolvido por – Wender</div>
    </div>
  </div>

  <script>
    const usuarios = {
      dev: [
        "wender.souza@alloha.com"
      ],
      time: [
        "luiza.carvalho@alloha.com",
        "john.santana@alloha.com",
        "eudes.filho@alloha.com",
        "alisson.lima@alloha.com",
        "brunno.leon@alloha.com"
      ],
      
      solicitante: [
        "talita.nascimento@alloha.com"
      ]
    };

    function detectarPerfil(email) {
      if (usuarios.dev.includes(email)) return "dev";
      if (usuarios.time.includes(email)) return "time";
      if (usuarios.solicitante.includes(email)) return "solicitante";
      return null;
    }

    function fazerLogin() {
      const email = document.getElementById("emailInput").value.trim().toLowerCase();
      const errorMsg = document.getElementById("errorMsg");

      if (!email) {
        errorMsg.textContent = "⚠️ Informe seu e-mail.";
        errorMsg.classList.add("show");
        return;
      }

      const perfil = detectarPerfil(email);

      if (!perfil) {
        errorMsg.textContent = "⚠️ Usuário não autorizado.";
        errorMsg.classList.add("show");
        return;
      }

      errorMsg.classList.remove("show");

      localStorage.setItem("usuario", email);
      localStorage.setItem("perfil", perfil);

      window.location.href = "index.html";
    }

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        fazerLogin();
      }
    });

    const usuarioLogado = localStorage.getItem("usuario");
    const perfilLogado = localStorage.getItem("perfil");

    if (usuarioLogado && perfilLogado) {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
