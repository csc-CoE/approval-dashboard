<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Esboços</title>

<style>
:root {
  --bg: #071226;
  --surface: #0f1c3d;
  --surface-2: #16264d;
  --border: #243766;
  --accent: #2f80ff;
  --accent-2: #7b61ff;
  --text: #f4f7ff;
  --muted: #aab7d6;
  --success: #1fc77e;
  --warning: #f2b94b;
  --danger: #eb5757;
  --info: #56ccf2;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: "Segoe UI", Arial;
  background:
    radial-gradient(circle at top left, rgba(47,128,255,0.16), transparent 28%),
    linear-gradient(180deg, #06101f 0%, #071226 100%);
  color: var(--text);
}

.header {
  background: rgba(7,18,38,0.95);
  padding: 18px 28px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
}

.title-wrap { display:flex; gap:12px; align-items:center; }

.title-icon {
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,#2f80ff,#7b61ff);
  display:flex;align-items:center;justify-content:center;
}

.title { font-weight:700; }

.chip, .btn {
  background:var(--surface);
  border:1px solid var(--border);
  padding:8px 12px;
  border-radius:10px;
  font-size:12px;
}

.container { padding:24px; max-width:1400px; margin:auto; }

.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:16px;
  margin-bottom:20px;
}

.card {
  background:var(--surface);
  padding:20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,0.06);
}

.card .value { font-size:28px; font-weight:700; }

.table-box {
  background:var(--surface);
  border-radius:16px;
  overflow:hidden;
}

table { width:100%; border-collapse:collapse; }

th {
  background:#182954;
  padding:12px;
  text-align:left;
  font-size:12px;
}

td { padding:12px; border-bottom:1px solid rgba(255,255,255,0.05); }

.status {
  padding:5px 10px;
  border-radius:999px;
  font-size:11px;
}

.status-pendente { background:rgba(242,185,75,0.15); color:#f2c15c; }
.status-fechado { background:rgba(31,199,126,0.15); color:#35d48d; }

.footer-dev {
  margin-top:30px;
  text-align:center;
  padding:20px;
  border-top:1px solid rgba(255,255,255,0.06);
  color:var(--muted);
}

</style>
</head>

<body>

<div class="header">
  <div class="title-wrap">
    <div class="title-icon">📋</div>
    <div>
      <div class="title">Painel de Esboços</div>
      <div id="updatedAt" style="font-size:12px;color:var(--muted)"></div>
    </div>
  </div>

  <div style="display:flex;gap:10px;">
    <div class="chip" id="userChip"></div>
    <div class="chip" id="roleChip"></div>
    <button class="btn" onclick="logout()">Sair</button>
  </div>
</div>

<div class="container">

<div class="cards">
  <div class="card"><div>Total</div><div class="value" id="statTotal">0</div></div>
  <div class="card"><div>Pendentes</div><div class="value" id="statPendentes">0</div></div>
  <div class="card"><div>Fechados</div><div class="value" id="statFechados">0</div></div>
  <div class="card"><div>Valor</div><div class="value" id="statValor">R$0</div></div>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>Prioridade</th>
<th>Nº</th>
<th>Status</th>
<th>Tratativa</th>
<th>Valor</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

</div>

<footer class="footer-dev">
COE • Desenvolvido por Wender
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
"https://ojgtpdwjcmqcbiydaesx.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let data = [];

async function loadData(){
  const res = await fetch("data.json");
  const json = await res.json();

  data = json.records;

  const {data:tratativas} = await supabase.from("tratativas_esboco").select("*");

  const map = {};
  tratativas.forEach(t=> map[t.numero_esboco]=t.situacao_tratamento);

  data = data.map(i=>{
    i.Status = i["Status Esboço"];
    if(map[i["Numero Esboço"]]){
      i["Situação do Tratamento"] = map[i["Numero Esboço"]];
    }
    return i;
  });

  render();
}

function render(){
  document.getElementById("tableBody").innerHTML =
    data.map(r=>`
    <tr onclick="openModal('${r["Numero Esboço"]}')">
      <td>${r.Prioridade}</td>
      <td>${r["Numero Esboço"]}</td>
      <td><span class="status ${r.Status=='Esboço Fechado'?'status-fechado':'status-pendente'}">${r.Status}</span></td>
      <td>${r["Situação do Tratamento"]||'-'}</td>
      <td>R$ ${r["Valor Total"]}</td>
    </tr>`).join('');
}

async function save(numero,valor){
  await supabase.from("tratativas_esboco").upsert({
    numero_esboco: numero,
    situacao_tratamento: valor
  });
  alert("Salvo");
  loadData();
}

function logout(){
  localStorage.clear();
  location.href="login.html";
}

loadData();
</script>

</body>
</html>
